<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제목</title>
<style>
  :root{
    --bg:#f5f5f7;
    --text:#222222;
    --sub:#6e6e73;
    --divider:#d6d6db;
    --border:#e2e2e6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:40px 32px 80px;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
  }
  h1{
    font-size:22px;
    font-weight:700;
    margin:0 0 4px;
  }
  .desc{
    color:var(--sub);
    font-size:13px;
    margin:0 0 32px;
  }
  h2.section-title{
    font-size:18px;
    font-weight:600;
    margin:0 0 16px;
    color:#222222;
  }

  /* 일정 박스를 감싸는 3단 그리드 */
  .schedule-wrap{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px;
  }
  @media (max-width: 1024px){
    .schedule-wrap{
      grid-template-columns:repeat(2, 1fr);
    }
  }
  @media (max-width: 640px){
    .schedule-wrap{
      grid-template-columns:1fr;
    }
  }

  /* 일정 박스 */
  .section-primary{
    background:#ffffff;
    border-radius:12px;
    border:1px solid var(--border);
    padding:32px 32px 28px;
    margin-bottom:8px;
    box-shadow:0 4px 16px rgba(0,0,0,0.05);
  }

  /* 일정 리스트 */
  .schedule-list{
    display:flex;
    flex-direction:column;
  }
  .schedule-item{
    display:flex;
    align-items:flex-start;
    gap:20px;
    padding:18px 0;
    border-bottom:1px solid var(--border);
  }
  .schedule-item:last-child{
    border-bottom:none;
  }
  .schedule-time{
    flex:0 0 90px;          /* 시간 영역 고정 너비 */
    font-weight:600;
    font-size:14px;
    color:#65a30d;
    white-space:nowrap;
  }
  .schedule-body{
    flex:1;
    display:flex;
    flex-direction:column;
  }
  .schedule-desc{
    font-size:14px;
    line-height:1.5;
    color:#222222;
  }

  /* 설명 안의 하위 목록 (- 항목 등) */
  .schedule-sub{
    margin:6px 0 0;
    padding-left:18px;
    font-size:13px;
    color:#222222;
  }
  .schedule-sub li{
    margin-bottom:2px;
    color:#222222;
  }

  /* 리스트 아래 주석: 구분선 없이 여백으로만 구분 */
  .schedule-comment{
    margin:10px 0 0;
    font-size:12px;
    color:var(--sub);
  }

  .divider{
    border:none;
    border-top:1px solid var(--divider);
    margin:48px 0;
  }
</style>
</head>
<body>

  <h1>제목🐟</h1>
  <p class="desc">내용만 교체해서 사용하세요.</p>

  <div class="schedule-wrap">

  <!-- 1번째 제목 -->
  <div class="section-primary">
    <h2 class="section-title">1번째</h2>
    <div class="schedule-list">

      <div class="schedule-item">
        <div class="schedule-time">09:00</div>
        <div class="schedule-body">
          <div class="schedule-desc">설명 텍스트가 들어가는 자리입니다.</div>
            <ul class="schedule-sub">
              <li>이렇게 항목도 가능⭐</li>
              <li>이렇게 항목도 가능</li>
            </ul>
          <p class="schedule-comment">참고사항.</p>
        </div>
      </div>

      <div class="schedule-item">
        <div class="schedule-time">10:30</div>
        <div class="schedule-body">
            <ul class="schedule-sub">
              <li>이렇게 항목도 가능</li>
              <li>이렇게 항목도 가능</li>
            </ul>
          
          <p class="schedule-comment">참고 사항을 입력하세요.</p>
        </div>
      </div>

      <div class="schedule-item">
        <div class="schedule-time">13:00</div>
        <div class="schedule-body">
          <div class="schedule-desc">설명 텍스트가 길어져도 시간 영역은 고정되고, 오른쪽 설명 영역만 줄바꿈됩니다.</div>
          <p class="schedule-comment">참고 사항을 입력하세요.</p>
        </div>
      </div>

    </div>
  </div>

  <!-- 2번째 제목 -->
  <div class="section-primary">
    <h2 class="section-title">2번째</h2>
    <div class="schedule-list">

      <div class="schedule-item">
        <div class="schedule-time">14:00</div>
        <div class="schedule-body">
          <div class="schedule-desc">설명 텍스트가 들어가는 자리입니다.</div>
          <p class="schedule-comment">참고 사항을 입력하세요.</p>
        </div>
      </div>

      <div class="schedule-item">
        <div class="schedule-time">16:00</div>
        <div class="schedule-body">
          <div class="schedule-desc">설명 텍스트가 들어가는 자리입니다.</div>
          <p class="schedule-comment">참고 사항을 입력하세요.</p>
        </div>
      </div>

    </div>
  </div>

  </div>

</body>
</html>
